{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-between align-center fade-in mb-4">
    <h2 style="margin:0">Pricing Analytics</h2>
    <button class="btn-green" id="btn-export">Export to CSV</button>
</div>

<div class="results-row fade-in delay-1">
    <div class="card glass-panel stat-card">
        <h4>Total Records</h4>
        <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="card glass-panel stat-card">
        <h4>Avg Price Multiplier</h4>
        <div class="stat-value text-muted" id="stat-avg-mult">1.0x</div>
    </div>
    <div class="card glass-panel stat-card">
        <h4>Highest Price</h4>
        <div class="stat-value ai-gradient" id="stat-highest">$0</div>
    </div>
    <div class="card glass-panel stat-card">
        <h4>Lowest Price</h4>
        <div class="stat-value text-muted" id="stat-lowest">$0</div>
    </div>
</div>

<div class="card glass-panel fade-in delay-2 mt-4">
    <div class="d-flex justify-between align-center mb-4">
        <h3>Price History Table</h3>
        <div class="d-flex gap-2">
            <select id="filter-cat" class="btn-outline">
                <option value="all">All Categories</option>
                <option value="hotel">Hotel</option>
                <option value="flight">Flight</option>
                <option value="saas">SaaS</option>
            </select>
        </div>
    </div>
    <div style="overflow-x:auto;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date/Time</th>
                    <th>Product</th>
                    <th>Base Price</th>
                    <th>Final Price</th>
                    <th>Multiplier</th>
                    <th>Strategy</th>
                    <th>Demand</th>
                </tr>
            </thead>
            <tbody id="analytics-tbody">
                <!-- JS inj -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
