{% extends 'base.html' %}
{% block content %}
<div class="fade-in">
    <h2 style="margin-bottom:1.5rem">A/B Testing Simulator</h2>
</div>

<div class="dashboard-grid fade-in delay-1" style="grid-template-columns: 1fr 1fr; gap: 2rem;">
    <!-- Scenario A -->
    <div class="card glass-panel" style="border-top: 4px solid var(--primary)">
        <div class="d-flex justify-between align-center mb-4">
            <h3 style="margin:0">Scenario A</h3>
            <span class="badge badge-blue" id="sim-winner-a" style="display:none">Winner 🏆</span>
        </div>
        
        <div class="form-row d-flex gap-4 mb-4">
            <div class="form-group w-full">
                <label>Base Price ($)</label><input type="number" id="base_a" value="250">
            </div>
            <div class="form-group w-full">
                <label>Competitor ($)</label><input type="number" id="comp_a" value="240">
            </div>
        </div>
        
        <div class="form-group"><label>Demand Factor</label>
            <input type="range" id="dem_a" min="0" max="3" step="0.1" value="1.0">
        </div>
        <div class="form-group"><label>Scarcity Factor (Stock)</label>
            <input type="range" id="stock_a" min="0" max="200" value="50">
        </div>
        
        <div class="stat-card" style="background:rgba(0,0,0,0.2); border-radius:8px; margin-top:1rem">
            <h4>Predicted Price A</h4>
            <div class="stat-value" id="res_a" style="color:var(--primary)">$0.00</div>
            <div>Rev Est: <span id="rev_a">$0</span></div>
        </div>
    </div>

    <!-- Scenario B -->
    <div class="card glass-panel" style="border-top: 4px solid var(--accent-purple)">
        <div class="d-flex justify-between align-center mb-4">
            <h3 style="margin:0">Scenario B</h3>
            <span class="badge badge-purple" id="sim-winner-b" style="display:none">Winner 🏆</span>
        </div>
        
        <div class="form-row d-flex gap-4 mb-4">
            <div class="form-group w-full">
                <label>Base Price ($)</label><input type="number" id="base_b" value="250">
            </div>
            <div class="form-group w-full">
                <label>Competitor ($)</label><input type="number" id="comp_b" value="200">
            </div>
        </div>
        
        <div class="form-group"><label>Demand Factor</label>
            <input type="range" id="dem_b" min="0" max="3" step="0.1" value="2.0">
        </div>
        <div class="form-group"><label>Scarcity Factor (Stock)</label>
            <input type="range" id="stock_b" min="0" max="200" value="10">
        </div>
        
        <div class="stat-card" style="background:rgba(0,0,0,0.2); border-radius:8px; margin-top:1rem">
            <h4>Predicted Price B</h4>
            <div class="stat-value" id="res_b" style="color:var(--accent-purple)">$0.00</div>
            <div>Rev Est: <span id="rev_b">$0</span></div>
        </div>
    </div>
</div>

<div class="card glass-panel fade-in delay-2 mt-4">
    <h3>Revenue Comparison</h3>
    <div class="chart-container" style="height:200px"><canvas id="simChart"></canvas></div>
</div>
{% endblock %}
