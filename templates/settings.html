{% extends 'base.html' %}
{% block content %}
<div class="fade-in mb-4">
    <h2>System Settings</h2>
</div>

<div class="dashboard-grid fade-in delay-1">
    <!-- Left Col -->
    <div class="card glass-panel flex-col gap-4">
        <h3>General Configuration</h3>
        
        <div class="form-group">
            <label>Currency Selector</label>
            <select id="set_currency">
                <option value="$">$ (USD)</option>
                <option value="₹">₹ (INR)</option>
                <option value="€">€ (EUR)</option>
                <option value="£">£ (GBP)</option>
            </select>
        </div>
        
        <div class="form-group theme-switch-container">
            <label>Theme</label>
            <div class="theme-toggle-wrapper">
                <span>🌙 Dark (Midnight Purple)</span>
                <label class="switch">
                    <input type="checkbox" id="settings-theme-toggle">
                    <span class="slider round"></span>
                </label>
                <span>☀️ Light (Premium Gold)</span>
            </div>
            <select id="set_theme" style="display:none;">
                <option value="dark">dark</option>
                <option value="light">light</option>
            </select>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const toggle = document.getElementById('settings-theme-toggle');
                const select = document.getElementById('set_theme');
                
                if(localStorage.getItem('nexus_theme') === 'light') {
                    toggle.checked = true;
                    select.value = 'light';
                }

                toggle.addEventListener('change', (e) => {
                    const theme = e.target.checked ? 'light' : 'dark';
                    select.value = theme;
                    if(typeof applyTheme === 'function') {
                        applyTheme(theme);
                    }
                });
            });
        </script>
    </div>

    <!-- Right Col -->
    <div class="card glass-panel flex-col gap-4">
        <h3>ML Model Tuning</h3>
        <p class="text-muted" style="margin-top:-10px; font-size:0.9rem">Adjust the underlying base multiplier influences.</p>
        
        <div class="form-group">
            <div class="range-header"><label>Demand Weight</label><span class="range-val" id="wt_dem">0.45</span></div>
            <input type="range" class="ml-weight" id="w_demand" min="0" max="1" step="0.01" value="0.45">
        </div>
        
        <div class="form-group">
            <div class="range-header"><label>Scarcity Weight</label><span class="range-val" id="wt_sca">0.30</span></div>
            <input type="range" class="ml-weight" id="w_scarcity" min="0" max="1" step="0.01" value="0.30">
        </div>
        
        <div class="form-group">
            <div class="range-header"><label>Competition Weight</label><span class="range-val" id="wt_comp">0.15</span></div>
            <input type="range" class="ml-weight" id="w_comp" min="0" max="1" step="0.01" value="0.15">
        </div>
        
        <div class="form-group">
            <div class="range-header"><label>Time Weight</label><span class="range-val" id="wt_tim">0.10</span></div>
            <input type="range" class="ml-weight" id="w_time" min="0" max="1" step="0.01" value="0.10">
        </div>
        
        <div class="d-flex align-center gap-2 mt-4" style="background:rgba(0,0,0,0.2); padding:1rem; border-radius:8px;">
            <input type="checkbox" id="toggle_ml" checked style="width:20px; height:20px; cursor:pointer;">
            <label style="font-weight:600; cursor:pointer;" for="toggle_ml">Enable Predictive ML Mode (Fallback to Rule-Based if disabled)</label>
        </div>
        
    </div>
</div>
<div class="card glass-panel fade-in delay-2 mt-4" style="text-align: center;">
    <button class="btn-green" id="btn-save-settings" style="padding: 12px 30px; font-size: 1.1rem;">Save All Settings to Cloud</button>
</div>
{% endblock %}
